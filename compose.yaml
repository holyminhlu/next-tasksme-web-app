services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.docker}
      POSTGRES_DB: taskmng
    # Host port intentionally omitted to avoid conflicting with local PostgreSQL.
    # Services reach the database via the internal hostname `db:5432`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmng"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_NAME: taskmng-backend
      APP_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/taskmng?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env.docker}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      JWT_ACCESS_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 14
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      BODY_SIZE_LIMIT: 100kb
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
      AUTH_RATE_LIMIT_WINDOW_MS: 60000
      AUTH_RATE_LIMIT_MAX: 20
      LOG_LEVEL: info
      ENABLE_SWAGGER: "true"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/api/v1/health/live'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
